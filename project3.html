<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="project3.css">
</head>
<body>

<div class="container">

    <h1>Tic Tac Toe</h1>

    <div class="mode">
        <button id="pvp" class="active">Multiplayer</button>
        <button id="ai">VS AI</button>
    </div>

    <div class="status" id="status">Player X Turn</div>

    <div class="board" id="board"></div>

    <div class="score">
        <div>X : <span id="xScore">0</span></div>
        <div>Draw : <span id="drawScore">0</span></div>
        <div>O : <span id="oScore">0</span></div>
    </div>

    <button id="restart" class="restart">Restart Game</button>

</div>

<script src="prpject3.js"></script>

</body>
</html>
